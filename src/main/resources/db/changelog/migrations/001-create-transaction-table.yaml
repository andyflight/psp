databaseChangeLog:
  - changeSet:
      id: 001-create-transaction-table
      author: junie
      changes:
        - createTable:
            tableName: transaction
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: card_number_masked
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: card_expiry_date
                  type: VARCHAR(7)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: acquirer_type
                  type: VARCHAR(50)
              - column:
                  name: merchant_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
