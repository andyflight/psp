spring.application.name=psp

# Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s

# R2DBC Configuration
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transaction_db}
spring.r2dbc.username=${DB_USERNAME:postgres}
spring.r2dbc.password=${DB_PASSWORD:postgres}

# Liquibase Configuration (Uses JDBC)
spring.liquibase.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transaction_db}
spring.liquibase.user=${DB_USERNAME:postgres}
spring.liquibase.password=${DB_PASSWORD:postgres}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Actuator
management.endpoint.health.show-components=always